<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Solo — récapitulatif du fingerprint collecté (TLS, HTTP, IP, navigateur, comportement)." />
  <meta name="theme-color" content="#0c0e13" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%237ad7ff' stroke-width='2'/%3E%3Ccircle cx='16' cy='16' r='4' fill='%23b07dff'/%3E%3C/svg%3E" />
  <title>Solo — Recap</title>
  <link rel="stylesheet" href="./tokens.css" />
  <style>
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
      line-height: 1.5;
    }
    header {
      padding: 32px 24px 16px;
      border-bottom: 1px solid var(--border);
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 { margin: 0 0 4px; font-size: 24px; }
    h2 { margin: 32px 0 12px; font-size: 18px; color: var(--accent); }
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .button {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--fg);
      text-decoration: none;
      font-size: 13px;
      cursor: pointer;
    }
    .button:hover { border-color: var(--accent); color: var(--accent); }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    th {
      background: #1c2130;
      font-weight: 600;
      color: var(--muted);
      width: 28%;
    }
    tr:last-child td { border-bottom: none; }
    code, pre {
      font-family: ui-monospace, SF Mono, Menlo, monospace;
      font-size: 12px;
    }
    pre {
      background: #0a0c11;
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 6px;
      overflow: auto;
      max-height: 280px;
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      background: #1c2130;
      color: var(--muted);
      margin-right: 4px;
    }
    .tag.warn { background: rgba(255,184,76,0.15); color: var(--warn); }
    .tag.ok { background: rgba(122,215,255,0.12); color: var(--accent); }
    .session-id {
      font-family: ui-monospace, SF Mono, Menlo, monospace;
      font-size: 13px;
      color: var(--muted);
    }
    .empty {
      color: var(--muted);
      font-style: italic;
    }

    /* Exposure summary card */
    .exposure {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 8px;
    }
    .exposure h2 { margin: 0 0 6px; color: var(--fg); font-size: 18px; }
    .exposure p { margin: 0 0 14px; color: var(--muted); font-size: 13px; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid transparent;
    }
    .badge.ok { background: rgba(90, 209, 154, 0.12); color: var(--ok); border-color: rgba(90, 209, 154, 0.3); }
    .badge.warn { background: rgba(255, 184, 76, 0.14); color: var(--warn); border-color: rgba(255, 184, 76, 0.3); }
    .badge.danger { background: rgba(255, 107, 107, 0.14); color: var(--danger); border-color: rgba(255, 107, 107, 0.32); }
    /* Brighter text than --muted to clear WCAG AA (≥4.5:1) on the dark chip. */
    .badge.neutral { background: #1c2130; color: #c7cdda; border-color: var(--border); }

    /* Per-card tri-state traffic light */
    .card-title { display: flex; align-items: center; gap: 9px; }
    /* The dot carries a shape/symbol (✓ ✗ ?) so the verdict is readable without
       relying on colour alone. Dark glyph for contrast on the light fills. */
    .card-dot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex: 0 0 auto;
      cursor: help;
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      color: #0c0e13;
    }
    .card-dot.bot { background: var(--danger); box-shadow: 0 0 7px rgba(255, 107, 107, 0.55); }
    .card-dot.human { background: var(--ok); box-shadow: 0 0 7px rgba(90, 209, 154, 0.45); }
    .card-dot.unknown { background: var(--warn); }

    /* Identification-only cards: neutral marker, NOT a verdict */
    .card-fp {
      flex: 0 0 auto;
      cursor: help;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      background: #1c2130;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 1px 8px;
    }

    /* Verdict card signal list */
    .verdict-signals { margin: 4px 0 0; padding-left: 18px; }
    .verdict-signals li { margin: 4px 0; color: var(--fg); font-size: 13px; }
    .verdict-signals code { color: var(--muted); }

    /* Group separators */
    .group-title {
      margin: 36px 0 4px;
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .group-title:first-of-type { margin-top: 16px; }

    /* Short pedagogical caption under each section heading */
    .section-note { color: var(--muted); font-size: 12.5px; margin: -4px 0 10px; max-width: 760px; }

    /* Readability: wrap long hex / hashes instead of horizontal scroll */
    td code { overflow-wrap: anywhere; word-break: break-word; }

    /* Dashboard scoreboard — one clickable chip per analysed dimension */
    .scoreboard { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 2px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #1c2130;
      font-size: 13px;
      color: var(--fg);
      cursor: pointer;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip .card-dot { cursor: pointer; }

    /* Collapsible data sections — closed by default to keep the page scannable;
       a section carrying a 'bot' signal opens itself so problems stay visible. */
    details.card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin: 10px 0;
      padding: 0 16px;
    }
    details.card > summary {
      list-style: none;
      cursor: pointer;
      padding: 13px 0;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 9px;
    }
    details.card > summary::-webkit-details-marker { display: none; }
    details.card > summary::after {
      content: '⌄';
      margin-left: auto;
      color: var(--muted);
      font-weight: 400;
      transition: transform 0.15s ease;
    }
    details.card[open] > summary::after { transform: rotate(180deg); }
    details.card[open] { padding-bottom: 14px; }
    details.card > .section-note { margin-top: 0; }
    details.card table { margin-top: 4px; }
    /* A section that holds a robot signal gets a subtle red edge. */
    details.card:has(.card-dot.bot) { border-color: rgba(255, 107, 107, 0.4); }

    /* Verdict card — per-level grouping */
    .level-group { margin-top: 12px; }
    .level-group:first-of-type { margin-top: 6px; }
    .level-head { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .level-head .badge { font-size: 11px; font-weight: 600; padding: 2px 9px; }

    /* Visually-hidden but available to screen readers (table captions etc.). */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Skip-link: first focusable element, jumps straight to the long content. */
    .skip-link {
      position: absolute;
      left: 8px;
      top: -48px;
      z-index: 100;
      background: var(--accent);
      color: #0c0e13;
      padding: 8px 14px;
      border-radius: 0 0 8px 8px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: top 0.15s ease;
    }
    .skip-link:focus { top: 0; }

    /* Colour-independent legend for the dots. */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      align-items: center;
      margin: 0 0 14px;
      padding: 10px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .legend-item { display: inline-flex; align-items: center; gap: 7px; }
    .legend .card-dot, .legend .card-fp { cursor: default; }

    /* Long enumerations as wrapping pills (no horizontal overflow on mobile). */
    .list-wrap { display: flex; flex-wrap: wrap; gap: 4px 6px; }
    .pill {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 6px;
      background: #1c2130;
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg);
      overflow-wrap: anywhere;
    }

    /* Simple objects as a key/value grid instead of raw JSON. */
    .kv { display: grid; grid-template-columns: auto 1fr; gap: 2px 12px; margin: 0; }
    .kv dt { color: var(--muted); font-family: var(--mono); font-size: 11px; }
    .kv dd { margin: 0; }

    /* Announced loading + error states. */
    .status { display: flex; align-items: center; gap: 10px; color: var(--muted); padding: 18px 0; }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
    .error-panel {
      background: rgba(255, 107, 107, 0.12);
      border: 1px solid rgba(255, 107, 107, 0.4);
      color: var(--fg);
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
    }

    @media (max-width: 640px) {
      /* Stacked layout: distinguish the th label from its value with an accent
         edge + brighter text, since they no longer sit in separate columns. */
      th {
        width: auto;
        display: block;
        border-bottom: none;
        padding: 8px 12px 2px;
        background: transparent;
        color: var(--fg);
        border-left: 3px solid var(--accent);
      }
      td { display: block; padding: 2px 12px 8px; border-left: 3px solid transparent; }
      tr { display: block; border-bottom: 1px solid var(--border); }
      tr:last-child { border-bottom: none; }
      .kv { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#content">Aller au contenu</a>
  <header>
    <h1>Recap fingerprint</h1>
    <div class="session-id" id="session-id">…</div>
    <div class="toolbar">
      <a id="export-link" class="button" href="#" download>Exporter JSON</a>
      <a class="button" href="/">Nouvelle collecte</a>
    </div>
  </header>

  <main id="content" role="main" aria-label="Récapitulatif du fingerprint" tabindex="-1">Chargement…</main>

  <script type="module" src="./recap.ts"></script>
</body>
</html>
